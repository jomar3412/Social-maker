{% extends "base.html" %}

{% block title %}Content Engine - Error{% endblock %}

{% block content %}
<div class="max-w-md mx-auto text-center py-16">
    <div class="w-16 h-16 rounded-full bg-red-500/10 border border-red-500/20 flex items-center justify-center mx-auto mb-6">
        <svg class="w-8 h-8 text-red-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                  d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"/>
        </svg>
    </div>

    <h1 class="text-2xl font-semibold mb-3">Error</h1>
    <p class="text-gray-400 mb-8">{{ error }}</p>

    <a href="/wizard" class="btn-primary inline-block text-white px-6 py-3 rounded-xl">
        Back to Wizard
    </a>
</div>
{% endblock %}
